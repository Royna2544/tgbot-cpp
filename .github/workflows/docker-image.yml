name: Docker Image CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Fetch the pinned Telegram Bot API spec
        run: python scripts/fetch_api_spec.py
      - name: Lint C++ types and methods against api.json
        run: python scripts/lint_api_types.py api.json include/tgbot/types --methods src/Api.cpp
      - name: Check generated parsers are in sync with the spec
        run: python scripts/gen_parsers.py --check

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build docker image
        run: docker build -t reo7sp/tgbot-cpp -f Dockerfile .
      - name: Build docker image with examples and unit tests
        run: docker build -t reo7sp/tgbot-cpp-test -f Dockerfile_test .
      - name: Run unit tests
        run: docker run --rm reo7sp/tgbot-cpp-test
